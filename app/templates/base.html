<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareerPilot AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div id="app">
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="flash-messages" style="max-width:600px; margin:20px auto; padding:0 20px;">
                    {% for message in messages %}
                        <div class="flash" style="background:var(--amber-light); padding:12px 16px; border-radius:8px; margin-bottom:6px; color:var(--amber-dark); font-weight:500; border-left:4px solid var(--amber);">
                            {{ message }}
                        </div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
